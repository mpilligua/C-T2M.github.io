<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#2b4eff"/>
  <!-- dashed motion path (waypoint trajectory), tucked at the bottom -->
  <path d="M4 58 Q 20 52 32 56 T 60 50"
        fill="none" stroke="#ffffff" stroke-width="2"
        stroke-linecap="round" stroke-dasharray="3 3" opacity="0.7"/>
  <circle cx="4"  cy="58" r="2" fill="#ffffff"/>
  <circle cx="32" cy="56" r="2" fill="#ffffff"/>
  <circle cx="60" cy="50" r="2" fill="#ffffff"/>
  <!-- walking figure, much bigger -->
  <g stroke="#ffffff" stroke-width="5" stroke-linecap="round" fill="none">
    <circle cx="32" cy="11" r="7" fill="#ffffff" stroke="none"/>
    <line x1="32" y1="18" x2="32" y2="40"/>
    <line x1="32" y1="26" x2="20" y2="32"/>
    <line x1="32" y1="26" x2="44" y2="22"/>
    <line x1="32" y1="40" x2="22" y2="54"/>
    <line x1="32" y1="40" x2="44" y2="52"/>
  </g>
</svg>
